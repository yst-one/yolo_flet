on:
  # 💡 就是这行！加上它，GitHub 网页上就会立刻出现手动运行的按钮
  workflow_dispatch:
  pull:
    branches:
    - main
    - master
jobs:
  my_job:
    name: build_whl_update
    runs-on: ubuntu-22.04

    steps:
    # 1. 把你 GitHub 仓库里的代码下载到这台虚拟电脑上
    - name: 签出代码
      uses: actions/checkout@v6

      # 2. 调用 Astral 官方的 uv 插件（自动安装最新版 uv，并自动配置好 Python 环境）
    - name: 设置 UV 环境
      uses: astral-sh/setup-uv@v6
      with:
        # 顺便开启缓存功能，这样以后每次编译只要几秒钟
        enable-cache: true
    - name: 编译生成 WHL 包
      run: |
        rm -rf dist/*
        uv build
        
    - name: 保存编译产物
      uses: actions/upload-artifact@v6
      with:
        name: yolo-flet-whl-packages
        path: dist/

    # 4. 使用 uv 的发布功能，一秒钟推送到 PyPI 官方
    - name: 发布到 PyPI
      run: |
        # 使用刚才在 GitHub 密室里存的钥匙进行安全认证
        uv publish --token ${{ secrets.PYPI_API_TOKEN }}
